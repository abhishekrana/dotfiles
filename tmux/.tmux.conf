# =============================================================================
# General Settings
# =============================================================================

# Reduce escape delay to 0 (critical for Neovim -- default 500ms causes lag)
set -sg escape-time 0

# True color support (needed for Neovim themes, bat, delta, etc.)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"

# Mouse support (click panes, resize, scroll)
set -g mouse on

# Scrollback buffer (default is 2000 -- 50k is a good balance)
set -g history-limit 50000

# Start window/pane numbering at 1 (0 is awkward to reach)
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1

# Auto-renumber windows when one is closed (no gaps)
set -g renumber-windows on

# Don't let programs rename windows
set -g allow-rename off

# Enable focus events (needed for Neovim autoread)
set -g focus-events on

# vi mode for status line key bindings
set -g status-keys vi

# Clipboard -- Wayland native (wl-copy)
set -g set-clipboard on
set -g copy-command 'wl-copy'

# Increase message display time
set -g display-time 2000
set -g display-panes-time 2000

# =============================================================================
# Prefix -- keep default Ctrl-b
# =============================================================================

# Using default Ctrl-b prefix (no change needed)

# =============================================================================
# Key Bindings
# =============================================================================

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Splits -- visual mnemonics, preserve current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation (prefix + h/j/k/l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt+number to switch windows without prefix
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Alt+j/k to cycle windows
bind -n M-j previous-window
bind -n M-k next-window

# Alt+h/l to switch panes (no prefix)
bind -n M-h select-pane -L
bind -n M-l select-pane -R

# Pane resizing (repeatable with -r)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Swap panes
bind > swap-pane -D
bind < swap-pane -U

# Move window positions
bind -r P swap-window -t -1 \; select-window -t -1
bind -r N swap-window -t +1 \; select-window -t +1

# Toggle synchronized panes (type in all panes at once)
bind S set synchronize-panes \; display "Sync #{?synchronize-panes,ON,OFF}"

# Kill without confirmation prompt
unbind x
bind x kill-pane
bind X kill-session

# Even out pane sizes
bind = select-layout tiled

# =============================================================================
# Copy Mode (vi-style)
# =============================================================================

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"

# =============================================================================
# Status Bar
# =============================================================================

set -g status-position bottom
set -g status-interval 5
# Solarized Light colors
# base03=#002b36 base02=#073642 base01=#586e75 base00=#657b83
# base0=#839496  base1=#93a1a1  base2=#eee8d5  base3=#fdf6e3
# yellow=#b58900 orange=#cb4b16 red=#dc322f green=#859900
# cyan=#2aa198   blue=#268bd2   violet=#6c71c4 magenta=#d33682

set -g status-style "fg=#657b83,bg=#eee8d5"
set -g status-left "#[fg=#fdf6e3,bg=#268bd2,bold] #S #[fg=#268bd2,bg=#eee8d5] "
set -g status-left-length 30
set -g status-right "#{?client_prefix,#[fg=#dc322f bold] PREFIX ,}#($HOME/.local/bin/gitmux -cfg $HOME/.gitmux.conf \"#{pane_current_path}\") #[fg=#cb4b16]#(cd #{pane_current_path} && git log -1 --format='%%h' 2>/dev/null) #[fg=#6c71c4]#($HOME/.local/bin/tmux-ci-status.sh) #[fg=#657b83]%Y-%m-%d %H:%M "
set -g status-right-length 200
set -g window-status-current-format "#[fg=#fdf6e3,bg=#b58900,bold] #I:#W#{?window_zoomed_flag, Z,} "
set -g window-status-format "#[fg=#93a1a1] #I:#W "
set -g window-status-activity-style "fg=#93a1a1,bg=#eee8d5,none"

# Pane borders
set -g pane-border-style "fg=#93a1a1"
set -g pane-active-border-style "fg=#268bd2"

# Pane border labels (show command and path)
set -g pane-border-status top
set -g pane-border-format " #{pane_index}: #{pane_current_command} [#{pane_current_path}] "

# Activity monitoring (highlight windows with new output)
set -g monitor-activity on
set -g visual-activity off

# Bell notifications (useful for agent idle detection)
set -g monitor-bell on
set -g bell-action any
set -g window-status-bell-style "fg=#fdf6e3,bg=#dc322f,bold"

# =============================================================================
# Plugins (via TPM)
# =============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# Plugin settings
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'

# tmux-yank: use wl-copy on Wayland, auto-copy on mouse select
set -g @yank_with_mouse on
set -g @override_copy_command 'wl-copy'

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'

# Override tmux-yank mouse drag binding (must be after TPM)
# Copy to both clipboard (Ctrl+Shift+V) and primary selection (Shift+Insert)
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "bash -c 'cat | tee >(wl-copy) | wl-copy --primary'"
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "bash -c 'cat | tee >(wl-copy) | wl-copy --primary'"
